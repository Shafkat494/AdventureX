{% extends "base.html" %}

{% block content %}

<style>
.upload-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 30px 15px;
    background: linear-gradient(135deg, #667eea, #764ba2, #6b5b95);
}

.upload-card {
    width: 100%;
    max-width: 500px;
    padding: 40px 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 45px rgba(0,0,0,0.25);
    transition: 0.3s;
}

.upload-card:hover {
    transform: translateY(-4px);
}

.upload-card h3 {
    text-align: center;
    font-weight: 700;
    margin-bottom: 10px;
    color: #333;
}

.upload-card p {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 25px;
}

label {
    display: block;
    font-weight: 500;
    margin-bottom: 5px;
    color: #444;
}

.form-control {
    width: 100%;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #ddd;
    transition: 0.2s;
    box-sizing: border-box; /* Ensures padding doesn't break width */
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 10px rgba(102,126,234,0.4);
    outline: none;
}

textarea.form-control {
    height: 120px;
    resize: none;
}

.btn-custom {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    color: white;
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    width: 100%;
    transition: 0.3s;
    cursor: pointer;
    margin-top: 10px;
}

.btn-custom:hover {
    opacity: 0.95;
    transform: scale(1.03);
}

.alert {
    text-align: center;
    padding: 10px 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.alert-danger {
    background-color: #f8d7da;
    color: #842029;
    border: 1px solid #f5c2c7;
}

.alert-success {
    background-color: #d1e7dd;
    color: #0f5132;
    border: 1px solid #badbcc;
}

.mb-3 {
    margin-bottom: 1rem;
}
</style>

<div class="upload-wrapper">
    <div class="upload-card">
        <h3>Upload Product 📦</h3>
        <p>Fill in the details and upload your product</p>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            {{ success }}
        </div>
        {% endif %}

        <form action="/upload" method="post" enctype="multipart/form-data">

            <label for="title">Product Title</label>
            <input type="text" id="title" name="title" class="form-control mb-3" placeholder="Enter product title" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control mb-3" placeholder="Enter product description" required></textarea>

            <label for="price">Price (₹)</label>
            <input type="number" id="price" name="price" step="0.01" min="0" class="form-control mb-3" placeholder="0.00" required>

            <label for="file">Product Image</label>
            <input type="file" id="file" name="file" accept="image/*" class="form-control mb-3" required>

            <button type="submit" class="btn btn-custom">Upload Product</button>
        </form>
    </div>
</div>

{% endblock %}
