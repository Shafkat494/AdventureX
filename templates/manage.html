{% extends "base.html" %}

{% block content %}

<style>
.manage-wrapper {
    padding: 40px 10px;
}

.product-card {
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-img {
    height: 100%;
    object-fit: cover;
}

.product-title {
    font-weight: 700;
    font-size: 26px;
    color: #222;
}

.product-price {
    font-size: 24px;
    font-weight: 700;
    color: #667eea;
}

.product-desc {
    color: #666;
    font-size: 15px;
    line-height: 1.6;
}

.btn-premium {
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-edit {
    background: #f1f1f1;
    color: #333;
}

.btn-delete {
    background: linear-gradient(135deg, #ff4d4d, #c9184a);
    color: white;
    border: none;
}

.btn-delete:hover {
    opacity: 0.9;
    transform: scale(1.02);
}

.breadcrumb a {
    text-decoration: none;
    color: #667eea;
}
</style>

<div class="manage-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">

                <div class="product-card">
                    <div class="row g-0">

                        <!-- IMAGE -->
                        <div class="col-md-6">
                            <img src="/static/uploads/{{ product.image }}" class="product-img w-100">
                        </div>

                        <!-- DETAILS -->
                        <div class="col-md-6 p-4">

                            <!-- Breadcrumb -->
                            <nav>
                                <ol class="breadcrumb">
                                    <li class="breadcrumb-item">
                                        <a href="/dashboard">Dashboard</a>
                                    </li>
                                </ol>
                            </nav>

                            <!-- Title -->
                            <div class="product-title mb-2">
                                {{ product.title }}
                            </div>

                            <!-- Price -->
                            <div class="product-price mb-3">
                                ₹{{ "{:,.2f}".format(product.price) }}
                            </div>

                            <!-- Description -->
                            <div class="product-desc">
                                {{ product.description }}
                            </div>

                            <hr class="my-4">

                            <!-- ACTIONS -->
                            <div class="d-grid gap-2 mt-4">

                                <a href="/edit/{{ product.id }}" class="btn btn-edit">
                                    Edit Listing
                                </a>

                                {% if user and user.id == product.owner_id %}
                                <form method="post" action="/delete/{{ product.id }}" onsubmit="return confirm('Are you sure you want to delete this item?');">
                                    <button type="submit" class="btn btn-delete">
                                        Delete Listing
                                    </button>
                                </form>
                                {% endif %}

                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
