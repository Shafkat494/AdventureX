{% extends "base.html" %}

{% block title %}
Login | AdventureX
{% endblock %}

{% block content %}

<section class="min-h-[85vh] flex items-center justify-center px-6 py-16">

    <div class="w-full max-w-md">

        <!-- ================================================= -->
        <!-- CARD -->
        <!-- ================================================= -->

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

            <!-- Top Banner -->
            <div class="bg-blue-600 px-8 py-10 text-center">

                <h1 class="text-4xl font-bold text-white">

                    Welcome Back

                </h1>

                <p class="text-blue-100 mt-4">

                    Login to continue your adventure journey.

                </p>

            </div>


            <!-- ================================================= -->
            <!-- FORM -->
            <!-- ================================================= -->

            <div class="p-8">

                {% if error %}

                <div class="bg-red-100 text-red-600 px-4 py-3 rounded-xl mb-6">

                    {{ error }}

                </div>

                {% endif %}

                <form action="/login"
                    method="POST"
                    class="space-y-6">

                    <!-- Username -->
                    <div>

                        <label class="block mb-2 font-medium">

                            Username

                        </label>

                        <input type="text"
                            name="username"
                            required
                            placeholder="Enter username"
                            class="w-full border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    </div>

                    <!-- Password -->
                    <div>

                        <label class="block mb-2 font-medium">

                            Password

                        </label>

                        <input type="password"
                            name="password"
                            required
                            placeholder="Enter password"
                            class="w-full border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    </div>

                    <!-- Button -->
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-semibold transition">

                        Login

                    </button>

                </form>


                <!-- ================================================= -->
                <!-- SIGNUP LINK -->
                <!-- ================================================= -->

                <div class="text-center mt-8">

                    <p class="text-gray-500">

                        Don't have an account?

                        <a href="/signup"
                            class="text-blue-600 font-semibold hover:underline">

                            Create Account

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
