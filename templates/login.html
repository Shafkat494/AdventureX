{% extends "base.html" %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
    }
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 85vh;
    }
    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 35px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }
    .title { text-align: center; font-weight: 700; color: #333; margin-bottom: 10px; }
    .subtitle { text-align: center; font-size: 14px; color: #777; margin-bottom: 25px; }
    label { font-weight: 500; display: block; margin-bottom: 5px; }
    .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
    .btn-custom {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none; color: white; border-radius: 12px; padding: 12px;
        font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px;
    }
    .alert-danger {
        background-color: #f8d7da; color: #842029; padding: 10px;
        border-radius: 10px; margin-bottom: 20px; text-align: center; border: 1px solid #f5c2c7;
    }
    .footer-text { text-align: center; margin-top: 15px; font-size: 14px; }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h3 class="title">Welcome Back 👋</h3>
        <p class="subtitle">Login to your CampusCraft account</p>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <label>Username</label>
            <input name="username" class="form-control mb-3" placeholder="Enter username" required>

            <label>Password</label>
            <div style="display: flex; gap: 5px; margin-bottom: 20px;">
                <input id="password" name="password" type="password" class="form-control" placeholder="Enter password" required>
                <button type="button" style="border-radius:12px; border:1px solid #ddd; padding: 0 10px;" onclick="togglePassword(this)">👁</button>
            </div>

            <button type="submit" class="btn-custom">Login</button>
        </form>

        <div class="footer-text">
            Don’t have an account? <a href="/signup" style="color:#667eea; font-weight:600; text-decoration:none;">Signup</a>
        </div>
    </div>
</div>

<script>
function togglePassword(btn) {
    const field = document.getElementById("password");
    if (field.type === "password") {
        field.type = "text";
        btn.innerText = "🙈";
    } else {
        field.type = "password";
        btn.innerText = "👁";
    }
}
</script>
{% endblock %}
