{% extends "base.html" %}

{% block title %}
Sign Up | AdventureX
{% endblock %}

{% block content %}

<section class="min-h-[90vh] flex items-center justify-center px-6 py-16">

    <div class="w-full max-w-2xl">

        <!-- ================================================= -->
        <!-- CARD -->
        <!-- ================================================= -->

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

            <!-- Top Banner -->
            <div class="bg-blue-600 px-8 py-10 text-center">

                <h1 class="text-5xl font-bold text-white">

                    Join AdventureX

                </h1>

                <p class="text-blue-100 mt-4 text-lg">

                    Start exploring trekking, skiing,
                    climbing and adventure experiences.

                </p>

            </div>


            <!-- ================================================= -->
            <!-- FORM -->
            <!-- ================================================= -->

            <div class="p-8 md:p-10">

                {% if error %}

                <div class="bg-red-100 text-red-600 px-4 py-3 rounded-xl mb-6">

                    {{ error }}

                </div>

                {% endif %}

                <form action="/signup"
                    method="POST"
                    class="space-y-7">

                    <!-- ================================================= -->
                    <!-- BASIC INFO -->
                    <!-- ================================================= -->

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <!-- Username -->
                        <div>

                            <label class="block mb-2 font-medium">

                                Username

                            </label>

                            <input type="text"
                                name="username"
                                required
                                placeholder="Choose username"
                                class="w-full border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

                        </div>

                        <!-- Email -->
                        <div>

                            <label class="block mb-2 font-medium">

                                Email

                            </label>

                            <input type="email"
                                name="email"
                                required
                                placeholder="Enter email"
                                class="w-full border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

                        </div>

                    </div>


                    <!-- ================================================= -->
                    <!-- PASSWORDS -->
                    <!-- ================================================= -->

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <!-- Password -->
                        <div>

                            <label class="block mb-2 font-medium">

                                Password

                            </label>

                            <input type="password"
                                name="password"
                                required
                                placeholder="Create password"
                                class="w-full border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

                        </div>

                        <!-- Confirm Password -->
                        <div>

                            <label class="block mb-2 font-medium">

                                Confirm Password

                            </label>

                            <input type="password"
                                name="confirm_password"
                                required
                                placeholder="Confirm password"
                                class="w-full border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

                        </div>

                    </div>


                    <!-- ================================================= -->
                    <!-- ROLE -->
                    <!-- ================================================= -->

                    <div>

                        <label class="block mb-3 font-medium">

                            Select Account Type

                        </label>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                            <!-- Traveler -->
                            <label class="border border-gray-300 rounded-2xl p-6 cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition">

                                <input type="radio"
                                    name="role"
                                    value="traveler"
                                    checked
                                    class="mb-4">

                                <h3 class="text-2xl font-bold mb-2">

                                    Traveler

                                </h3>

                                <p class="text-gray-500">

                                    Book trekking, skiing, climbing
                                    and adventure experiences.

                                </p>

                            </label>

                            <!-- Host -->
                            <label class="border border-gray-300 rounded-2xl p-6 cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition">

                                <input type="radio"
                                    name="role"
                                    value="host"
                                    class="mb-4">

                                <h3 class="text-2xl font-bold mb-2">

                                    Host

                                </h3>

                                <p class="text-gray-500">

                                    Create and manage adventure
                                    destinations for travelers.

                                </p>

                            </label>

                        </div>

                    </div>


                    <!-- ================================================= -->
                    <!-- BUTTON -->
                    <!-- ================================================= -->

                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-lg font-semibold transition">

                        Create Account

                    </button>

                </form>


                <!-- ================================================= -->
                <!-- LOGIN LINK -->
                <!-- ================================================= -->

                <div class="text-center mt-8">

                    <p class="text-gray-500">

                        Already have an account?

                        <a href="/login"
                            class="text-blue-600 font-semibold hover:underline">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
