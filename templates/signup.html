{% extends "base.html" %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
    }

    .signup-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 15px;
    }

    .signup-card {
        width: 100%;
        max-width: 450px;
        padding: 35px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .signup-card:hover {
        transform: translateY(-3px);
    }

    .title {
        text-align: center;
        font-weight: 700;
        margin-bottom: 8px;
        color: #333;
    }

    .subtitle {
        text-align: center;
        font-size: 14px;
        color: #777;
        margin-bottom: 25px;
    }

    label {
        display: block;
        font-weight: 500;
        margin-bottom: 5px;
        color: #444;
    }

    .form-control {
        border-radius: 12px;
        padding: 10px;
        border: 1px solid #ddd;
        transition: 0.2s;
        width: 100%;
        box-sizing: border-box;
    }

    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 8px rgba(102,126,234,0.4);
        outline: none;
    }

    /* Fix for input group alignment */
    .input-group {
        display: flex;
        width: 100%;
    }

    .input-group .form-control {
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
        flex: 1;
    }

    .input-group button {
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
        border: 1px solid #ddd;
        border-left: none;
        background: #fff;
        padding: 0 15px;
    }

    .btn-custom {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        color: white;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        transition: 0.3s;
        cursor: pointer;
        margin-top: 10px;
    }

    .btn-custom:hover {
        opacity: 0.9;
        transform: scale(1.02);
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .footer-text a {
        color: #667eea;
        font-weight: 500;
        text-decoration: none;
    }

    .footer-text a:hover {
        text-decoration: underline;
    }

    .alert-danger {
        background-color: #f8d7da;
        color: #842029;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 14px;
        border: 1px solid #f5c2c7;
    }
</style>

<div class="signup-wrapper">

    <div class="signup-card">

        <h3 class="title">Create Account 🎓</h3>
        <p class="subtitle">Join CampusCraft marketplace</p>

        {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="post">

            <div class="mb-3">
                <label class="form-label">Select Role</label>
                <select name="role" class="form-control" required>
                    <option value="customer">Customer (Buyer)</option>
                    <option value="owner">Owner (Seller)</option>
                </select>
            </div>

            <label for="username">Full Name</label>
            <input id="username" name="username" class="form-control mb-3" placeholder="Enter your name" required>

            <label for="email">Email</label>
            <input id="email" type="email" name="email" class="form-control mb-3" placeholder="Enter your email" required>

            <div class="mb-3">
                <label for="password">Password</label>
                <div class="input-group">
                    <input id="password" name="password" type="password" class="form-control" placeholder="Create password" required>
                    <button type="button" onclick="togglePassword('password', this)">👁</button>
                </div>
            </div>

            <div class="mb-3">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-group">
                    <input id="confirm_password" name="confirm_password" type="password" class="form-control" placeholder="Confirm password" required>
                    <button type="button" onclick="togglePassword('confirm_password', this)">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-custom w-100">Signup</button>

        </form>

        <div class="footer-text">
            Already have an account? <a href="/login">Login</a>
        </div>

    </div>

</div>

<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
        btn.innerText = "🙈";
    } else {
        field.type = "password";
        btn.innerText = "👁";
    }
}
</script>

{% endblock %}
