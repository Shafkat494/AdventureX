{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2 class="mb-4">🛒 Your Cart</h2>

    {% if cart_items %}
        <div class="row">
            {% for item in cart_items %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    
                    <img src="/static/uploads/{{ item.product.image }}" class="card-img-top">

                    <div class="card-body text-center">
                        <h5>{{ item.product.title }}</h5>
                        <p class="text-muted">{{ item.product.description }}</p>
                        <p class="fw-bold">₹{{ item.product.price }}</p>

                        <!-- ✅ REMOVE BUTTON -->
                        <form method="post" action="/remove-cart/{{ item.id }}">
                            <button class="btn btn-danger btn-sm w-100 mt-2">
                                ❌ Remove from Cart
                            </button>
                        </form>

                    </div>

                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <p>Your cart is empty 😢</p>
    {% endif %}
</div>

{% endblock %}
